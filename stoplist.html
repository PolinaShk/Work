<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Стоп-лист ресторана</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f0f0f0;
            padding: 20px;
        }
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 10px;
        }
        .nav {
            text-align: center;
            margin-bottom: 30px;
        }
        .nav a {
            color: #2196f3;
            text-decoration: none;
            margin: 0 10px;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .section {
            margin-bottom: 30px;
        }
        .section-title {
            font-size: 22px;
            font-weight: bold;
            color: #e91e63;
            border-bottom: 2px solid #e91e63;
            padding-bottom: 8px;
            margin-bottom: 15px;
        }
        .item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            border-bottom: 1px solid #eee;
        }
        .item-name {
            font-size: 16px;
        }
        .item-category {
            color: #888;
            font-size: 12px;
            margin-left: 10px;
        }
        .item-price {
            color: #666;
            font-size: 14px;
        }
        .modifier-type {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 11px;
            margin-left: 10px;
        }
        .type-ADDITIVE { background: #ff9800; color: white; }
        .type-SIZE { background: #2196f3; color: white; }
        .type-SPICINESS { background: #9c27b0; color: white; }
        .toggle {
            position: relative;
            display: inline-block;
            width: 60px;
            height: 28px;
        }
        .toggle input {
            opacity: 0;
            width: 0;
            height: 0;
        }
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #ccc;
            transition: 0.3s;
            border-radius: 28px;
        }
        .slider:before {
            position: absolute;
            content: "";
            height: 22px;
            width: 22px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: 0.3s;
            border-radius: 50%;
        }
        input:checked + .slider {
            background-color: #4caf50;
        }
        input:checked + .slider:before {
            transform: translateX(32px);
        }
        .refresh-btn {
            display: block;
            margin: 20px auto 0;
            padding: 10px 20px;
            background: #4caf50;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <h1>🚫 Стоп-лист ресторана</h1>
    <div class="nav">
        <a href="/">📋 Заказы</a>
        <a href="/stoplist.html">🚫 Стоп-лист</a>
    </div>
    <div class="container" id="stoplist-container">
        <div style="text-align: center;">Загрузка...</div>
    </div>
    <button class="refresh-btn" onclick="loadAll()">🔄 Обновить</button>

    <script>
        async function loadAll() {
            await loadItems();
            await loadModifiers();
        }
        
        async function loadItems() {
            try {
                const response = await fetch('/api/stoplist');
                const items = await response.json();
                
                const container = document.getElementById('stoplist-container');
                
                let html = `<div class="section">
                    <div class="section-title">🍕 Позиции меню</div>`;
                
                for (const item of items) {
                    html += `
                        <div class="item">
                            <div>
                                <span class="item-name">🍽 ${item.name}</span>
                                <span class="item-category">(${item.categoryName})</span>
                                <div class="item-price">${item.price} руб.</div>
                            </div>
                            <div style="display: flex; align-items: center;">
                                <label class="toggle">
                                    <input type="checkbox" ${item.isAvailable ? 'checked' : ''} 
                                           onchange="toggleItem(${item.id}, this.checked)">
                                    <span class="slider"></span>
                                </label>
                                <span style="margin-left: 10px; font-size: 12px;">${item.isAvailable ? 'Доступно' : 'Недоступно'}</span>
                            </div>
                        </div>
                    `;
                }
                html += `</div><div class="section" id="modifiers-section"><div class="section-title">🥗 Модификаторы</div><div id="modifiers-list">Загрузка...</div></div>`;
                container.innerHTML = html;
            } catch (error) {
                console.error('Ошибка:', error);
            }
        }
        
        async function loadModifiers() {
            try {
                const response = await fetch('/api/modifiers');
                const modifiers = await response.json();
                
                const modifiersList = document.getElementById('modifiers-list');
                if (!modifiersList) return;
                
                const typeNames = {
                    'ADDITIVE': '🥗 Добавки',
                    'SIZE': '📏 Размер',
                    'SPICINESS': '🌶️ Острота'
                };
                
                // Группируем по типу
                const grouped = { ADDITIVE: [], SIZE: [], SPICINESS: [] };
                for (const m of modifiers) {
                    grouped[m.type].push(m);
                }
                
                let html = '';
                for (const [type, typeModifiers] of Object.entries(grouped)) {
                    if (typeModifiers.length === 0) continue;
                    html += `<div style="margin-top: 20px;"><strong>${typeNames[type]}:</strong></div>`;
                    for (const m of typeModifiers) {
                        html += `
                            <div class="item">
                                <div>
                                    <span class="item-name">${m.name}</span>
                                    <div class="item-price">${m.price > 0 ? m.price + ' руб' : 'бесплатно'}</div>
                                </div>
                                <div style="display: flex; align-items: center;">
                                    <label class="toggle">
                                        <input type="checkbox" ${m.isAvailable ? 'checked' : ''} 
                                               onchange="toggleModifier(${m.id}, this.checked)">
                                        <span class="slider"></span>
                                    </label>
                                    <span style="margin-left: 10px; font-size: 12px;">${m.isAvailable ? 'Доступно' : 'Недоступно'}</span>
                                </div>
                            </div>
                        `;
                    }
                }
                modifiersList.innerHTML = html;
            } catch (error) {
                console.error('Ошибка:', error);
                const modifiersList = document.getElementById('modifiers-list');
                if (modifiersList) modifiersList.innerHTML = '<div style="color:red;">Ошибка загрузки модификаторов</div>';
            }
        }
        
        async function toggleItem(itemId, isAvailable) {
            try {
                await fetch(`/api/stoplist/${itemId}/toggle`, { method: 'PATCH' });
            } catch (error) {
                console.error('Ошибка:', error);
                alert('Ошибка при обновлении');
                loadItems();
            }
        }
        
        async function toggleModifier(modifierId, isAvailable) {
            try {
                await fetch(`/api/modifiers/${modifierId}/toggle`, { method: 'PATCH' });
            } catch (error) {
                console.error('Ошибка:', error);
                alert('Ошибка при обновлении');
                loadModifiers();
            }
        }
        
        loadAll();
    </script>
</body>
</html>
