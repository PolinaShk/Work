<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Управление товарами</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f0f0; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        h1 { text-align: center; color: #333; margin-bottom: 20px; }
        .nav { text-align: center; margin-bottom: 30px; }
        .nav a { color: #2196f3; text-decoration: none; margin: 0 10px; }
        .card { background: white; border-radius: 12px; padding: 20px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .card h3 { color: #e91e63; margin-bottom: 15px; border-bottom: 2px solid #e91e63; padding-bottom: 8px; }
        .item-card { border: 1px solid #ddd; border-radius: 8px; padding: 15px; margin-bottom: 15px; display: flex; gap: 15px; align-items: center; }
        .item-photo { width: 80px; height: 80px; object-fit: cover; border-radius: 8px; background: #f5f5f5; }
        .item-info { flex: 1; }
        .item-name { font-size: 18px; font-weight: bold; }
        .item-price { color: #e91e63; font-weight: bold; }
        .item-desc { font-size: 12px; color: #666; margin-top: 5px; }
        .btn-edit { background: #2196f3; color: white; padding: 5px 10px; border: none; border-radius: 4px; cursor: pointer; }
        .btn-delete { background: #f44336; color: white; padding: 5px 10px; border: none; border-radius: 4px; cursor: pointer; }
        .btn-add { background: #4caf50; color: white; padding: 10px 20px; border: none; border-radius: 6px; cursor: pointer; margin-bottom: 15px; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; }
        .modal-content { background: white; padding: 25px; border-radius: 12px; width: 500px; max-width: 90%; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: bold; color: #555; }
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px; }
        .photo-preview { width: 100px; height: 100px; object-fit: cover; border-radius: 8px; margin-top: 10px; }
        .btn-save { background: #4caf50; color: white; padding: 10px 20px; border: none; border-radius: 6px; cursor: pointer; }
        .btn-cancel { background: #999; color: white; padding: 10px 20px; border: none; border-radius: 6px; cursor: pointer; margin-left: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🍽 Управление товарами</h1>
        <div class="nav">
            <a href="/">📋 Заказы</a>
            <a href="/stoplist.html">🚫 Стоп-лист</a>
            <a href="/modifiers.html">🥗 Модификаторы</a>
            <a href="/items.html">🍽 Товары</a>
            <a href="/settings.html">⚙️ Настройки</a>
            <a href="/users.html">👥 Пользователи</a>
            <a href="/analytics.html">📊 Аналитика</a>
        </div>
        
        <div class="card">
            <h3>Список товаров</h3>
            <button class="btn-add" onclick="openAddModal()">➕ Добавить товар</button>
            <div id="itemsList"></div>
        </div>
    </div>
    
    <!-- Модальное окно -->
    <div id="modal" class="modal">
        <div class="modal-content">
            <h3 id="modalTitle">Добавить товар</h3>
            <input type="hidden" id="itemId">
            <div class="form-group">
                <label>Название *</label>
                <input type="text" id="itemName" required>
            </div>
            <div class="form-group">
                <label>Цена (руб) *</label>
                <input type="number" id="itemPrice" step="10" required>
            </div>
            <div class="form-group">
                <label>Категория *</label>
                <select id="itemCategoryId"></select>
            </div>
            <div class="form-group">
                <label>Описание</label>
                <textarea id="itemDescription" rows="2"></textarea>
            </div>
            <div class="form-group">
                <label>Состав</label>
                <textarea id="itemComposition" rows="2"></textarea>
            </div>
            <div class="form-group">
                <label>Фото</label>
                <input type="file" id="itemPhoto" accept="image/*">
                <img id="photoPreview" class="photo-preview" style="display:none;">
            </div>
            <div class="form-group">
                <label>Доступность</label>
                <select id="itemAvailable">
                    <option value="1">Доступен</option>
                    <option value="0">Недоступен</option>
                </select>
            </div>
            <div style="text-align: right; margin-top: 20px;">
                <button class="btn-save" onclick="saveItem()">Сохранить</button>
                <button class="btn-cancel" onclick="closeModal()">Отмена</button>
            </div>
        </div>
    </div>
    
    <script>
        async function loadItems() {
            try {
                const res = await fetch('/api/items');
                const items = await res.json();
                const categoriesRes = await fetch('/api/categories');
                const categories = await categoriesRes.json();
                
                const container = document.getElementById('itemsList');
                container.innerHTML = '';
                
                for (const item of items) {
                    const category = categories.find(c => c.id === item.categoryId);
                    const div = document.createElement('div');
                    div.className = 'item-card';
                    div.innerHTML = `
                        ${item.imageUrl ? `<img class="item-photo" src="${item.imageUrl}" onerror="this.style.display='none'">` : '<div class="item-photo" style="display:flex;align-items:center;justify-content:center;">📷</div>'}
                        <div class="item-info">
                            <div class="item-name">${item.name}</div>
                            <div class="item-price">${item.price} руб.</div>
                            <div class="item-desc">${category?.name || 'Без категории'}</div>
                            ${item.description ? `<div class="item-desc">📝 ${item.description.substring(0, 50)}...</div>` : ''}
                        </div>
                        <div>
                            <button class="btn-edit" onclick="openEditModal(${item.id})">✏️</button>
                            <button class="btn-delete" onclick="deleteItem(${item.id})">🗑</button>
                        </div>
                    `;
                    container.appendChild(div);
                }
            } catch (error) {
                console.error('Ошибка:', error);
            }
        }
        
        async function loadCategories() {
            const res = await fetch('/api/categories');
            const cats = await res.json();
            const select = document.getElementById('itemCategoryId');
            select.innerHTML = '';
            for (const cat of cats) {
                select.innerHTML += `<option value="${cat.id}">${cat.name}</option>`;
            }
        }
        
        function openAddModal() {
            document.getElementById('modalTitle').textContent = '➕ Добавить товар';
            document.getElementById('itemId').value = '';
            document.getElementById('itemName').value = '';
            document.getElementById('itemPrice').value = '';
            document.getElementById('itemDescription').value = '';
            document.getElementById('itemComposition').value = '';
            document.getElementById('itemAvailable').value = '1';
            document.getElementById('photoPreview').style.display = 'none';
            document.getElementById('itemPhoto').value = '';
            loadCategories();
            document.getElementById('modal').style.display = 'flex';
        }
        
        async function openEditModal(id) {
            const res = await fetch('/api/items');
            const items = await res.json();
            const item = items.find(i => i.id === id);
            if (!item) return;
            
            document.getElementById('modalTitle').textContent = '✏️ Редактировать товар';
            document.getElementById('itemId').value = item.id;
            document.getElementById('itemName').value = item.name;
            document.getElementById('itemPrice').value = item.price;
            document.getElementById('itemDescription').value = item.description || '';
            document.getElementById('itemComposition').value = item.composition || '';
            document.getElementById('itemAvailable').value = item.isAvailable ? '1' : '0';
            if (item.imageUrl) {
                document.getElementById('photoPreview').src = item.imageUrl;
                document.getElementById('photoPreview').style.display = 'block';
            }
            await loadCategories();
            document.getElementById('itemCategoryId').value = item.categoryId;
            document.getElementById('modal').style.display = 'flex';
        }
        
        async function saveItem() {
            const id = document.getElementById('itemId').value;
            const name = document.getElementById('itemName').value;
            const price = parseFloat(document.getElementById('itemPrice').value);
            const categoryId = parseInt(document.getElementById('itemCategoryId').value);
            const description = document.getElementById('itemDescription').value;
            const composition = document.getElementById('itemComposition').value;
            const isAvailable = document.getElementById('itemAvailable').value === '1';
            
            if (!name || !price) {
                alert('Заполните обязательные поля');
                return;
            }
            
            try {
                let itemId;
                if (id) {
                    await fetch(`/api/items/${id}`, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ name, price, categoryId, description, composition, isAvailable })
                    });
                    itemId = id;
                } else {
                    const res = await fetch('/api/items', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ name, price, categoryId, description, composition, isAvailable })
                    });
                    const data = await res.json();
                    itemId = data.id;
                }
                
                // Загрузка фото
                const photoFile = document.getElementById('itemPhoto').files[0];
                if (photoFile) {
                    const formData = new FormData();
                    formData.append('photo', photoFile);
                    await fetch(`/api/items/${itemId}/upload`, { method: 'POST', body: formData });
                }
                
                closeModal();
                loadItems();
            } catch (error) {
                console.error('Ошибка:', error);
                alert('Ошибка сохранения');
            }
        }
        
        async function deleteItem(id) {
            if (confirm('Удалить товар?')) {
                await fetch(`/api/items/${id}`, { method: 'DELETE' });
                loadItems();
            }
        }
        
        function closeModal() {
            document.getElementById('modal').style.display = 'none';
        }
        
        // Предпросмотр фото
        document.getElementById('itemPhoto').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(ev) {
                    document.getElementById('photoPreview').src = ev.target.result;
                    document.getElementById('photoPreview').style.display = 'block';
                };
                reader.readAsDataURL(file);
            }
        });
        
        loadItems();
    </script>
</body>
</html>
