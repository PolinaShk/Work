<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Настройки ресторана</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f0f0; padding: 20px; }
        .container { max-width: 1000px; margin: 0 auto; }
        h1 { text-align: center; color: #333; margin-bottom: 20px; }
        .nav { text-align: center; margin-bottom: 30px; }
        .nav a { color: #2196f3; text-decoration: none; margin: 0 10px; }
        .card { background: white; border-radius: 12px; padding: 20px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .card h3 { color: #e91e63; margin-bottom: 15px; border-bottom: 2px solid #e91e63; padding-bottom: 8px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; color: #555; }
        input, select { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; }
        button { padding: 10px 20px; background: #4caf50; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 14px; }
        button:hover { background: #45a049; }
        .slot-item { display: flex; gap: 10px; margin-bottom: 10px; align-items: center; }
        .slot-item input { flex: 1; }
        .remove-slot { background: #f44336; padding: 8px 15px; }
        .add-slot { background: #2196f3; margin-top: 10px; }
        .time-row { display: flex; gap: 10px; align-items: center; margin-bottom: 10px; }
        .time-row select { width: auto; flex: 1; }
        .save-btn { margin-top: 20px; width: 100%; }
        .success { background: #d4edda; color: #155724; padding: 10px; border-radius: 6px; margin-bottom: 15px; display: none; }
        .error { background: #f8d7da; color: #721c24; padding: 10px; border-radius: 6px; margin-bottom: 15px; display: none; }
    </style>
</head>
<body>
    <div class="container">
        <h1>⚙️ Настройки ресторана</h1>
        <div class="nav">
            <a href="/">📋 Заказы</a>
            <a href="/stoplist.html">🚫 Стоп-лист</a>
            <a href="/modifiers.html">🥗 Модификаторы</a>
            <a href="/settings.html">⚙️ Настройки</a>
            <a href="/users.html">👥 Пользователи</a>
            <a href="/analytics.html">📊 Аналитика</a>
        </div>
        
        <div id="successMsg" class="success">✅ Настройки сохранены</div>
        <div id="errorMsg" class="error">❌ Ошибка сохранения</div>
        
        <div class="card">
            <h3>🕐 Время работы ресторана</h3>
            <div id="workHours"></div>
            <button class="add-slot" onclick="addWorkDay()">➕ Добавить день</button>
        </div>
        
        <div class="card">
            <h3>⏰ Время приема заказов</h3>
            <div id="orderHours"></div>
            <button class="add-slot" onclick="addOrderDay()">➕ Добавить день</button>
        </div>
        
        <div class="card">
            <h3>📅 Период предзаказа</h3>
            <div class="form-group">
                <label>Максимальное количество дней для предзаказа</label>
                <input type="number" id="maxPreorderDays" min="1" max="30" value="7">
            </div>
            <div class="form-group">
                <label>Минимальное время для подготовки (минут)</label>
                <input type="number" id="minPrepareMinutes" min="15" max="120" value="15">
            </div>
        </div>
        
        <div class="card">
            <h3>⏱️ Слоты времени "На ближайшее время"</h3>
            <div id="timeSlots"></div>
            <button class="add-slot" onclick="addTimeSlot()">➕ Добавить слот</button>
        </div>
        
        <div class="card">
            <h3>🚫 Ограничения</h3>
            <div class="form-group">
                <label>За сколько минут до закрытия можно оформить заказ</label>
                <input type="number" id="closingMinutes" min="15" max="120" value="30">
            </div>
            <div class="form-group">
                <label>Максимальное количество заказов на один слот</label>
                <input type="number" id="maxOrdersPerSlot" min="1" max="100" value="10">
            </div>
        </div>
        
        <button class="save-btn" onclick="saveAllSettings()">💾 Сохранить все настройки</button>
    </div>
    
    <script>
        let workHours = [];
        let orderHours = [];
        let timeSlots = [15, 30, 45, 60];
        
        const daysOfWeek = ['Понедельник', 'Вторник', 'Среда', 'Четверг', 'Пятница', 'Суббота', 'Воскресенье'];
        
        async function loadSettings() {
            try {
                const res = await fetch('/api/settings');
                const data = await res.json();
                
                workHours = data.workHours || [
                    { day: 'Понедельник', isActive: true, open: '10:00', close: '22:00', breakStart: null, breakEnd: null },
                    { day: 'Вторник', isActive: true, open: '10:00', close: '22:00', breakStart: null, breakEnd: null },
                    { day: 'Среда', isActive: true, open: '10:00', close: '22:00', breakStart: null, breakEnd: null },
                    { day: 'Четверг', isActive: true, open: '10:00', close: '22:00', breakStart: null, breakEnd: null },
                    { day: 'Пятница', isActive: true, open: '10:00', close: '22:00', breakStart: null, breakEnd: null },
                    { day: 'Суббота', isActive: true, open: '11:00', close: '23:00', breakStart: null, breakEnd: null },
                    { day: 'Воскресенье', isActive: true, open: '11:00', close: '21:00', breakStart: null, breakEnd: null }
                ];
                orderHours = data.orderHours || JSON.parse(JSON.stringify(workHours));
                timeSlots = data.timeSlots || [15, 30, 45, 60];
                if (data.maxPreorderDays) document.getElementById('maxPreorderDays').value = data.maxPreorderDays;
                if (data.minPrepareMinutes) document.getElementById('minPrepareMinutes').value = data.minPrepareMinutes;
                if (data.closingMinutes) document.getElementById('closingMinutes').value = data.closingMinutes;
                if (data.maxOrdersPerSlot) document.getElementById('maxOrdersPerSlot').value = data.maxOrdersPerSlot;
                
                renderWorkHours();
                renderOrderHours();
                renderTimeSlots();
            } catch (error) {
                console.error('Ошибка загрузки настроек:', error);
            }
        }
        
        function renderWorkHours() {
            const container = document.getElementById('workHours');
            container.innerHTML = '';
            workHours.forEach((item, index) => {
                const div = document.createElement('div');
                div.className = 'time-row';
                div.innerHTML = `
                    <input type="checkbox" ${item.isActive ? 'checked' : ''} onchange="toggleWorkDay(${index})">
                    <select onchange="updateWorkDay(${index}, 'day', this.value)">
                        ${daysOfWeek.map(d => `<option ${item.day === d ? 'selected' : ''}>${d}</option>`).join('')}
                    </select>
                    <input type="time" value="${item.open}" onchange="updateWorkDay(${index}, 'open', this.value)" ${!item.isActive ? 'disabled' : ''}>
                    <span>—</span>
                    <input type="time" value="${item.close}" onchange="updateWorkDay(${index}, 'close', this.value)" ${!item.isActive ? 'disabled' : ''}>
                    <button onclick="removeWorkDay(${index})" style="background:#f44336;padding:5px 10px;">🗑</button>
                `;
                container.appendChild(div);
            });
        }
        
        function renderOrderHours() {
            const container = document.getElementById('orderHours');
            container.innerHTML = '';
            orderHours.forEach((item, index) => {
                const div = document.createElement('div');
                div.className = 'time-row';
                div.innerHTML = `
                    <input type="checkbox" ${item.isActive ? 'checked' : ''} onchange="toggleOrderDay(${index})">
                    <select onchange="updateOrderDay(${index}, 'day', this.value)">
                        ${daysOfWeek.map(d => `<option ${item.day === d ? 'selected' : ''}>${d}</option>`).join('')}
                    </select>
                    <input type="time" value="${item.open}" onchange="updateOrderDay(${index}, 'open', this.value)" ${!item.isActive ? 'disabled' : ''}>
                    <span>—</span>
                    <input type="time" value="${item.close}" onchange="updateOrderDay(${index}, 'close', this.value)" ${!item.isActive ? 'disabled' : ''}>
                    <button onclick="removeOrderDay(${index})" style="background:#f44336;padding:5px 10px;">🗑</button>
                `;
                container.appendChild(div);
            });
        }
        
        function renderTimeSlots() {
            const container = document.getElementById('timeSlots');
            container.innerHTML = '';
            timeSlots.forEach((slot, index) => {
                const div = document.createElement('div');
                div.className = 'slot-item';
                div.innerHTML = `
                    <input type="number" value="${slot}" onchange="updateTimeSlot(${index}, this.value)" placeholder="Минуты">
                    <button class="remove-slot" onclick="removeTimeSlot(${index})">🗑</button>
                `;
                container.appendChild(div);
            });
        }
        
        function toggleWorkDay(index) { workHours[index].isActive = !workHours[index].isActive; renderWorkHours(); }
        function updateWorkDay(index, field, value) { workHours[index][field] = value; }
        function removeWorkDay(index) { workHours.splice(index, 1); renderWorkHours(); }
        function addWorkDay() { workHours.push({ day: 'Понедельник', isActive: true, open: '10:00', close: '22:00', breakStart: null, breakEnd: null }); renderWorkHours(); }
        
        function toggleOrderDay(index) { orderHours[index].isActive = !orderHours[index].isActive; renderOrderHours(); }
        function updateOrderDay(index, field, value) { orderHours[index][field] = value; }
        function removeOrderDay(index) { orderHours.splice(index, 1); renderOrderHours(); }
        function addOrderDay() { orderHours.push({ day: 'Понедельник', isActive: true, open: '10:00', close: '22:00', breakStart: null, breakEnd: null }); renderOrderHours(); }
        
        function updateTimeSlot(index, value) { timeSlots[index] = parseInt(value); renderTimeSlots(); }
        function removeTimeSlot(index) { timeSlots.splice(index, 1); renderTimeSlots(); }
        function addTimeSlot() { timeSlots.push(30); renderTimeSlots(); }
        
        async function saveAllSettings() {
            const settings = {
                workHours,
                orderHours,
                timeSlots,
                maxPreorderDays: parseInt(document.getElementById('maxPreorderDays').value),
                minPrepareMinutes: parseInt(document.getElementById('minPrepareMinutes').value),
                closingMinutes: parseInt(document.getElementById('closingMinutes').value),
                maxOrdersPerSlot: parseInt(document.getElementById('maxOrdersPerSlot').value)
            };
            
            try {
                for (const [key, value] of Object.entries(settings)) {
                    await fetch(`/api/settings/${key}`, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ value })
                    });
                }
                document.getElementById('successMsg').style.display = 'block';
                setTimeout(() => { document.getElementById('successMsg').style.display = 'none'; }, 3000);
            } catch (error) {
                console.error('Ошибка сохранения:', error);
                document.getElementById('errorMsg').style.display = 'block';
                setTimeout(() => { document.getElementById('errorMsg').style.display = 'none'; }, 3000);
            }
        }
        
        loadSettings();
    </script>
</body>
</html>
