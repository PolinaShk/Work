<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Аналитика ресторана</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f0f0; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        h1 { text-align: center; color: #333; margin-bottom: 20px; }
        .nav { text-align: center; margin-bottom: 30px; }
        .nav a { color: #2196f3; text-decoration: none; margin: 0 10px; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: white; border-radius: 12px; padding: 20px; text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .stat-card h3 { color: #666; font-size: 14px; margin-bottom: 10px; }
        .stat-card .number { font-size: 32px; font-weight: bold; color: #e91e63; }
        .stat-card .total { font-size: 18px; color: #333; margin-top: 5px; }
        .card { background: white; border-radius: 12px; padding: 20px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .card h3 { color: #e91e63; margin-bottom: 15px; border-bottom: 2px solid #e91e63; padding-bottom: 8px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 10px; text-align: left; border-bottom: 1px solid #ddd; }
        th { background: #f5f5f5; }
        .bar-container { background: #eee; border-radius: 10px; margin: 5px 0; }
        .bar { background: #4caf50; color: white; padding: 5px 10px; border-radius: 10px; text-align: right; font-size: 12px; }
        .refresh-btn { display: block; margin: 0 auto 20px; padding: 10px 20px; background: #4caf50; color: white; border: none; border-radius: 8px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <h1>📊 Аналитика ресторана</h1>
        <div class="nav">
            <a href="/">📋 Заказы</a>
            <a href="/stoplist.html">🚫 Стоп-лист</a>
            <a href="/modifiers.html">🥗 Модификаторы</a>
            <a href="/settings.html">⚙️ Настройки</a>
            <a href="/users.html">👥 Пользователи</a>
            <a href="/analytics.html">📊 Аналитика</a>
        </div>
        
        <button class="refresh-btn" onclick="loadAnalytics()">🔄 Обновить</button>
        
        <div id="stats" class="stats-grid"></div>
        
        <div class="card">
            <h3>🍕 Топ-10 популярных позиций</h3>
            <div id="popularItems"></div>
        </div>
        
        <div class="card">
            <h3>⏰ Заказы по часам (сегодня)</h3>
            <div id="ordersByHour"></div>
        </div>
    </div>
    
    <script>
        async function loadAnalytics() {
            try {
                const res = await fetch('/api/analytics');
                const data = await res.json();
                
                const statsDiv = document.getElementById('stats');
                statsDiv.innerHTML = `
                    <div class="stat-card"><h3>Всего заказов</h3><div class="number">${data.total.count}</div><div class="total">💰 ${data.total.total || 0} руб.</div></div>
                    <div class="stat-card"><h3>Заказов сегодня</h3><div class="number">${data.today.count}</div><div class="total">💰 ${data.today.total || 0} руб.</div></div>
                    <div class="stat-card"><h3>Заказов за неделю</h3><div class="number">${data.week.count}</div><div class="total">💰 ${data.week.total || 0} руб.</div></div>
                    <div class="stat-card"><h3>Средний чек</h3><div class="number">${data.total.count > 0 ? Math.round(data.total.total / data.total.count) : 0} руб.</div></div>
                `;
                
                const popularDiv = document.getElementById('popularItems');
                if (data.popularItems && data.popularItems.length > 0) {
                    let html = '<table><thead><tr><th>Позиция</th><th>Кол-во заказов</th><th>Выручка</th></tr></thead><tbody>';
                    for (const item of data.popularItems) {
                        html += `<tr><td>🍽 ${item.itemName}</td><td>${item.totalCount}</td><td>${item.totalRevenue} руб.</td></tr>`;
                    }
                    html += '</tbody></table>';
                    popularDiv.innerHTML = html;
                } else {
                    popularDiv.innerHTML = '<p>Нет данных</p>';
                }
                
                const hoursDiv = document.getElementById('ordersByHour');
                if (data.ordersByHour && data.ordersByHour.length > 0) {
                    const maxCount = Math.max(...data.ordersByHour.map(h => h.count));
                    let html = '<div style="margin-top: 10px;">';
                    for (let hour = 10; hour <= 22; hour++) {
                        const hourData = data.ordersByHour.find(h => h.hour === hour);
                        const count = hourData ? hourData.count : 0;
                        const percent = maxCount > 0 ? (count / maxCount) * 100 : 0;
                        html += `<div style="margin-bottom: 10px;">
                            <span style="display: inline-block; width: 50px;">${hour}:00</span>
                            <div style="display: inline-block; width: 70%; background: #eee; border-radius: 10px;">
                                <div class="bar" style="width: ${percent}%; background: #4caf50; text-align: left; padding-left: 10px;">${count} заказов</div>
                            </div>
                        </div>`;
                    }
                    html += '</div>';
                    hoursDiv.innerHTML = html;
                } else {
                    hoursDiv.innerHTML = '<p>Нет данных за сегодня</p>';
                }
            } catch (error) {
                console.error('Ошибка загрузки аналитики:', error);
            }
        }
        
        loadAnalytics();
        setInterval(loadAnalytics, 30000);
    </script>
</body>
</html>
